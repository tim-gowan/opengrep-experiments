rules:
  - id: go-jwk-private-material
    message: "Hardcoded private JWK material in Go (strict)"
    severity: ERROR
    languages: [go]
    paths:
      include:
        - "**/*.go"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects map literals in Go that look like JWKs with private fields
        or regex fallbacks (strict baseline profile). Canonical rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: Go hardcoded private JWK (strict baseline)
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags:
        - jwk
        - cwe-798
        - hardcoded-credentials
        - go
        - secret-detection
        - jwk-profile-strict-baseline
      technology: [go]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    pattern-either:
      - patterns:
          - pattern: |
              $M := map[string]any{"kty": "RSA", ..., "d": $D, ...}
          - metavariable-regex:
              metavariable: $D
              regex: '^"[A-Za-z0-9_-]{32,}"$'
      - patterns:
          - pattern: |
              $M := map[string]any{"kty": "EC", ..., "d": $D, ...}
          - metavariable-regex:
              metavariable: $D
              regex: '^"[A-Za-z0-9_-]{32,}"$'
      - patterns:
          - pattern: |
              $M := map[string]any{"kty": "OKP", ..., "d": $D, ...}
          - metavariable-regex:
              metavariable: $D
              regex: '^"[A-Za-z0-9_-]{32,}"$'
      - pattern: |
          $M := map[string]any{"kty": "RSA", ..., "p": $P, ..., "q": $Q, ..., "dp": $DP, ..., "dq": $DQ, ...}
      - patterns:
          - pattern: |
              $M := map[string]any{"kty": "oct", ..., "k": $K, ...}
          - metavariable-regex:
              metavariable: $K
              regex: '^"[A-Za-z0-9_-]{32,}"$'
