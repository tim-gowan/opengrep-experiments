rules:
  - id: typescript-jwk-private-material
    message: "Hardcoded private JWK material in TypeScript (strict)"
    severity: ERROR
    languages: [typescript]
    paths:
      include:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.mts"
        - "**/*.cts"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects object literals in TypeScript that look like JWKs with
        private fields (strict baseline profile). Canonical rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: TypeScript hardcoded private JWK (strict baseline)
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags:
        - jwk
        - cwe-798
        - hardcoded-credentials
        - typescript
        - secret-detection
        - jwk-profile-strict-baseline
      technology: [typescript]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    pattern-either:
      - patterns:
          - pattern: |
              $OBJ = {kty: "RSA", ..., d: $D, ...}
          - metavariable-regex:
              metavariable: $D
              regex: '^"[A-Za-z0-9_-]{32,}"$'
      - patterns:
          - pattern: |
              $OBJ = {kty: "EC", ..., d: $D, ...}
          - metavariable-regex:
              metavariable: $D
              regex: '^"[A-Za-z0-9_-]{32,}"$'
      - patterns:
          - pattern: |
              $OBJ = {kty: "OKP", ..., d: $D, ...}
          - metavariable-regex:
              metavariable: $D
              regex: '^"[A-Za-z0-9_-]{32,}"$'
      - pattern: |
          $OBJ = {kty: "RSA", ..., p: $P, ..., q: $Q, ..., dp: $DP, ..., dq: $DQ, ...}
      - patterns:
          - pattern: |
              $OBJ = {kty: "oct", ..., k: $K, ...}
          - metavariable-regex:
              metavariable: $K
              regex: '^"[A-Za-z0-9_-]{32,}"$'
      - pattern-regex: '\"kty\"\\s*:\\s*\"(RSA|EC|OKP)\"[\\s\\S]{0,1200}\"(d|p|q|dp|dq|qi)\"\\s*:\\s*\"[A-Za-z0-9_-]{32,}\"'
      - pattern-regex: '\"kty\"\\s*:\\s*\"oct\"[\\s\\S]{0,1200}\"k\"\\s*:\\s*\"[A-Za-z0-9_-]{32,}\"'
