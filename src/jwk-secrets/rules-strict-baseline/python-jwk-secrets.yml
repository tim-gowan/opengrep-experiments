rules:
  - id: python-jwk-private-material
    message: "Hardcoded private JWK material in Python (strict)"
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "**/*.py"
        - "**/*.pyw"
        - "**/*.pyi"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects dict literals in Python that look like JWKs with private
        material (strict baseline profile for A/B comparison). Canonical
        rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: Python hardcoded private JWK (strict baseline)
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags:
        - jwk
        - cwe-798
        - hardcoded-credentials
        - python
        - secret-detection
        - jwk-profile-strict-baseline
      technology: [python]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    patterns:
      - pattern-either:
          - patterns:
              - pattern: |
                  $OBJ = {"kty": "RSA", "d": $D, ...}
              - metavariable-regex:
                  metavariable: $D
                  regex: '^"[A-Za-z0-9_-]{32,}"$'
          - patterns:
              - pattern: |
                  $OBJ = {"kty": "EC", "d": $D, ...}
              - metavariable-regex:
                  metavariable: $D
                  regex: '^"[A-Za-z0-9_-]{32,}"$'
          - patterns:
              - pattern: |
                  $OBJ = {"kty": "OKP", "d": $D, ...}
              - metavariable-regex:
                  metavariable: $D
                  regex: '^"[A-Za-z0-9_-]{32,}"$'
          - patterns:
              - pattern: |
                  $OBJ = {"kty": "oct", "k": $K, ...}
              - metavariable-regex:
                  metavariable: $K
                  regex: '^"[A-Za-z0-9_-]{32,}"$'
          - pattern: |
              $OBJ = {"kty": "RSA", "p": $P, "q": $Q, "dp": $DP, "dq": $DQ, ...}
