rules:
  - id: javascript-jwk-private-material
    message: "Hardcoded private JWK material in JavaScript (strict)"
    severity: ERROR
    languages: [javascript]
    paths:
      include:
        - "**/*.js"
        - "**/*.mjs"
        - "**/*.cjs"
        - "**/*.jsx"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects object literals in JavaScript that look like JWKs with
        private fields (strict profile). Canonical rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: JavaScript hardcoded private JWK (strict)
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags:
        - jwk
        - cwe-798
        - hardcoded-credentials
        - javascript
        - secret-detection
        - jwk-profile-strict
      technology: [javascript]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    pattern-either:
      - patterns:
          - pattern: |
              $OBJ = {kty: "RSA", ..., d: $D, ...}
          - metavariable-regex:
              metavariable: $D
              regex: '^"[A-Za-z0-9_-]{24,}"$'
      - patterns:
          - pattern: |
              $OBJ = {kty: "EC", ..., d: $D, ...}
          - metavariable-regex:
              metavariable: $D
              regex: '^"[A-Za-z0-9_-]{24,}"$'
      - patterns:
          - pattern: |
              $OBJ = {kty: "OKP", ..., d: $D, ...}
          - metavariable-regex:
              metavariable: $D
              regex: '^"[A-Za-z0-9_-]{24,}"$'
      - patterns:
          - pattern: |
              $OBJ = {kty: "RSA", ..., p: $P, ..., q: $Q, ..., dp: $DP, ..., dq: $DQ, ...}
          - metavariable-regex:
              metavariable: $P
              regex: '^"[A-Za-z0-9_-]{24,}"$'
          - metavariable-regex:
              metavariable: $Q
              regex: '^"[A-Za-z0-9_-]{24,}"$'
          - metavariable-regex:
              metavariable: $DP
              regex: '^"[A-Za-z0-9_-]{24,}"$'
          - metavariable-regex:
              metavariable: $DQ
              regex: '^"[A-Za-z0-9_-]{24,}"$'
      - patterns:
          - pattern: |
              $OBJ = {kty: "oct", ..., k: $K, ...}
          - metavariable-regex:
              metavariable: $K
              regex: '^"[A-Za-z0-9_-]{24,}"$'
      - pattern-regex: '\"kty\"\\s*:\\s*\"(RSA|EC|OKP)\"[\\s\\S]{0,1200}\"(d|p|q|dp|dq|qi)\"\\s*:\\s*\"[A-Za-z0-9_-]{24,}\"'
      - pattern-regex: '\"kty\"\\s*:\\s*\"oct\"[\\s\\S]{0,1200}\"k\"\\s*:\\s*\"[A-Za-z0-9_-]{24,}\"'
