rules:
  - id: generic-jwk-private-material
    message: "Hardcoded private JWK material in JSON, plaintext, or config (strict)"
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.json"
        - "**/*.txt"
        - "**/*.conf"
        - "**/*.ini"
        - "**/*.env"
        - "**/*.yaml"
        - "**/*.yml"
        - "**/*.toml"
        - "**/*.cfg"
        - "**/*.config"
        - "**/*.properties"
        - "**/*.tfvars"
        - "**/*.tfvars.json"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects JWK-shaped private key material in JSON, plaintext, or config
        (strict profile: metavariable / regex length constraints). Canonical
        rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: Generic JSON / text / config private JWK (strict)
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags:
        - jwk
        - cwe-798
        - hardcoded-credentials
        - secret-detection
        - generic
        - jwk-profile-strict
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    patterns:
      - pattern-either:
          - patterns:
              - pattern: |
                  {
                    "kty": "RSA",
                    ...,
                    "d": $D,
                    ...
                  }
              - metavariable-regex:
                  metavariable: $D
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
          - patterns:
              - pattern: |
                  {
                    "kty": "EC",
                    ...,
                    "d": $D,
                    ...
                  }
              - metavariable-regex:
                  metavariable: $D
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
          - patterns:
              - pattern: |
                  {
                    "kty": "OKP",
                    ...,
                    "d": $D,
                    ...
                  }
              - metavariable-regex:
                  metavariable: $D
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
          - patterns:
              - pattern: |
                  {
                    "kty": "oct",
                    ...,
                    "k": $K,
                    ...
                  }
              - metavariable-regex:
                  metavariable: $K
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
          - patterns:
              - pattern: |
                  {
                    "kty": "RSA",
                    ...,
                    "p": $P,
                    ...,
                    "q": $Q,
                    ...,
                    "dp": $DP,
                    ...,
                    "dq": $DQ,
                    ...
                  }
              - metavariable-regex:
                  metavariable: $P
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
              - metavariable-regex:
                  metavariable: $Q
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
              - metavariable-regex:
                  metavariable: $DP
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
              - metavariable-regex:
                  metavariable: $DQ
                  regex: '^"[A-Za-z0-9_-]{24,}"$'
          - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"RSA"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"d"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
          - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"EC"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"d"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
          - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"OKP"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"d"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
          - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"RSA"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"p"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"[\\s\\S]{0,1600}[\\\\]?"q"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"[\\s\\S]{0,1600}[\\\\]?"dp"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"[\\s\\S]{0,1600}[\\\\]?"dq"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
          - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"oct"[\\\\]?[\\s\\S]{0,1600}[\\\\]?"k"[\\\\]?\\s*:\\s*[\\\\]?"[A-Za-z0-9_-]{24,}"'
