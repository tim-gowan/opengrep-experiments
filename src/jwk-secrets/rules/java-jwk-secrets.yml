rules:
  - id: java-jwk-private-material
    message: "Hardcoded private JWK material in Java"
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "**/*.java"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects JSON-like JWK fragments in Java sources with private key
        fields (d, p, q, dp, k). Canonical rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: Java hardcoded private JWK
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags: [jwk, cwe-798, hardcoded-credentials, java, secret-detection]
      technology: [java]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    pattern-either:
      - pattern: '"kty":"RSA",...,"d":"..."'
      - pattern: '"kty":"EC",...,"d":"..."'
      - pattern: '"kty":"OKP",...,"d":"..."'
      - pattern: '"kty":"RSA",...,"p":"..."'
      - pattern: '"kty":"RSA",...,"dp":"..."'
      - pattern: '"kty":"oct",...,"k":"..."'
