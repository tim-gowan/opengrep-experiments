rules:
  - id: go-jwk-private-material
    message: "Hardcoded private JWK material in Go"
    severity: ERROR
    languages: [go]
    paths:
      include:
        - "**/*.go"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects map literals in Go that look like JWKs with private fields
        or regex fallbacks for stringly-typed JSON. Canonical rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: Go hardcoded private JWK
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags: [jwk, cwe-798, hardcoded-credentials, go, secret-detection]
      technology: [go]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    pattern-either:
      - pattern: |
          $M := map[string]any{"kty": "RSA", ..., "d": $D, ...}
      - pattern: |
          $M := map[string]any{"kty": "EC", ..., "d": $D, ...}
      - pattern: |
          $M := map[string]any{"kty": "OKP", ..., "d": $D, ...}
      - pattern: |
          $M := map[string]any{"kty": "RSA", ..., "p": $P, ..., "q": $Q, ...}
      - pattern: |
          $M := map[string]any{"kty": "RSA", ..., "dp": $DP, ..., "dq": $DQ, ...}
      - pattern: |
          $M := map[string]any{"kty": "oct", ..., "k": $K, ...}
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"(RSA|EC|OKP)"[\\\\]?[\\s\\S]{0,1200}[\\\\]?"(d|p|q|dp|dq|qi|oth)"[\\\\]?\\s*:'
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"oct"[\\\\]?[\\s\\S]{0,1200}[\\\\]?"k"[\\\\]?\\s*:'
