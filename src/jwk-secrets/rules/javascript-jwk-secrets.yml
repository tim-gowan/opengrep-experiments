rules:
  - id: javascript-jwk-private-material
    message: "Hardcoded private JWK material in JavaScript"
    severity: ERROR
    languages: [javascript]
    paths:
      include:
        - "**/*.js"
        - "**/*.mjs"
        - "**/*.cjs"
        - "**/*.jsx"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects object literals in JavaScript that look like JWKs with
        private fields or regex fallbacks for JSON-like strings. Canonical
        rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: JavaScript hardcoded private JWK
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags: [jwk, cwe-798, hardcoded-credentials, javascript, secret-detection]
      technology: [javascript]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    pattern-either:
      - pattern: |
          $OBJ = {kty: "RSA", ..., d: $D, ...}
      - pattern: |
          $OBJ = {kty: "EC", ..., d: $D, ...}
      - pattern: |
          $OBJ = {kty: "OKP", ..., d: $D, ...}
      - pattern: |
          $OBJ = {kty: "RSA", ..., p: $P, ..., q: $Q, ...}
      - pattern: |
          $OBJ = {kty: "RSA", ..., dp: $DP, ..., dq: $DQ, ...}
      - pattern: |
          $OBJ = {kty: "oct", ..., k: $K, ...}
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"(RSA|EC|OKP)"[\\\\]?[\\s\\S]{0,1200}[\\\\]?"(d|p|q|dp|dq|qi|oth)"[\\\\]?\\s*:'
      - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"oct"[\\\\]?[\\s\\S]{0,1200}[\\\\]?"k"[\\\\]?\\s*:'
