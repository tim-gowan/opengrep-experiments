rules:
  - id: python-jwk-private-material
    message: "Hardcoded private JWK material in Python"
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "**/*.py"
        - "**/*.pyw"
        - "**/*.pyi"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects dict literals in Python that look like JWKs with private
        material (RSA/EC/OKP private fields or symmetric oct k). Canonical
        rule pack: https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: Python hardcoded private JWK
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags: [jwk, cwe-798, hardcoded-credentials, python, secret-detection]
      technology: [python]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    patterns:
      - pattern-either:
          - pattern: |
              $OBJ = {"kty": "RSA", "d": $D, ...}
          - pattern: |
              $OBJ = {"kty": "EC", "d": $D, ...}
          - pattern: |
              $OBJ = {"kty": "OKP", "d": $D, ...}
          - pattern: |
              $OBJ = {"kty": "oct", "k": $K, ...}
          - pattern: |
              $OBJ = {"p": $P, "q": $Q, ...}
          - pattern: |
              $OBJ = {"dp": $DP, "dq": $DQ, "qi": $QI, ...}
          - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"(RSA|EC|OKP)"[\\\\]?[\\s\\S]{0,1200}[\\\\]?"(d|p|q|dp|dq|qi|oth)"[\\\\]?\\s*:'
          - pattern-regex: '[\\\\]?"kty"[\\\\]?\\s*:\\s*[\\\\]?"oct"[\\\\]?[\\s\\S]{0,1200}[\\\\]?"k"[\\\\]?\\s*:'
