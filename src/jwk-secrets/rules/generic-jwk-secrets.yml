rules:
  - id: generic-jwk-private-material
    message: "Hardcoded private JWK material in JSON, plaintext, or config"
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "**/*.json"
        - "**/*.txt"
        - "**/*.conf"
        - "**/*.ini"
        - "**/*.env"
        - "**/*.yaml"
        - "**/*.yml"
        - "**/*.toml"
        - "**/*.cfg"
        - "**/*.config"
        - "**/*.properties"
        - "**/*.tfvars"
        - "**/*.tfvars.json"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects JWK-shaped private key material in JSON documents, plaintext,
        or config files (RFC 7517/7518). Canonical rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: Generic JSON / text / config private JWK
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags: [jwk, cwe-798, hardcoded-credentials, secret-detection, generic]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    patterns:
      - pattern-either:
          # JSON object literals (formerly language=json)
          - pattern: |
              {
                "kty": "RSA",
                ...,
                "d": $D,
                ...
              }
          - pattern: |
              {
                "kty": "EC",
                ...,
                "d": $D,
                ...
              }
          - pattern: |
              {
                "kty": "OKP",
                ...,
                "d": $D,
                ...
              }
          - pattern: |
              {
                "kty": "oct",
                ...,
                "k": $K,
                ...
              }
          - pattern: |
              {
                ...,
                "p": $P,
                ...,
                "q": $Q,
                ...
              }
          - pattern: |
              {
                ...,
                "dp": $DP,
                ...,
                "dq": $DQ,
                ...,
                "qi": $QI,
                ...
              }
          # Minified / stringified JSON in text or config (formerly plaintext rule)
          - pattern: '"kty":"RSA",...,"d":"..."'
          - pattern: '"kty":"EC",...,"d":"..."'
          - pattern: '"kty":"OKP",...,"d":"..."'
          - pattern: '"kty":"RSA",...,"p":"..."'
          - pattern: '"kty":"RSA",...,"dp":"..."'
          - pattern: '"kty":"oct",...,"k":"..."'
