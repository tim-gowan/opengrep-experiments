rules:
  - id: csharp-jwk-private-material
    message: "Hardcoded private JWK material in .NET"
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "**/*.cs"
        - "**/*.csx"
    metadata:
      category: security
      cwe:
        - CWE-798
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      description: >-
        Detects JSON-like JWK strings in C# sources containing private key
        fields (d, p, q, dp, k for symmetric keys). Canonical rule pack:
        https://github.com/Endor-Solutions-Architecture/scripts/tree/main/opengrep_jwk_private_material
      display-name: C# hardcoded private JWK
      endor-category: vulnerability
      rule-origin-note: github-esa-scripts-opengrep-jwk-private-material
      endor-tags: [jwk, cwe-798, hardcoded-credentials, csharp, secret-detection]
      technology: [csharp]
      references:
        - https://datatracker.ietf.org/doc/html/rfc7517
        - https://datatracker.ietf.org/doc/html/rfc7518
    pattern-either:
      - pattern: '"kty":"RSA",...,"d":"..."'
      - pattern: '"kty":"EC",...,"d":"..."'
      - pattern: '"kty":"OKP",...,"d":"..."'
      - pattern: '"kty":"RSA",...,"p":"..."'
      - pattern: '"kty":"RSA",...,"dp":"..."'
      - pattern: '"kty":"oct",...,"k":"..."'
