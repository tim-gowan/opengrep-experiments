rules:
  # Forward pass: WSGI environ source --> start_response boundary
  # Bridges the control inversion gap for CVE-2018-1000164
  # (gunicorn process_headers CRLF injection)
  - id: python-wsgi-environ-to-start-response
    message: "WSGI control inversion: tainted data from environ flows to start_response headers"
    severity: WARNING
    languages: [python]
    mode: taint
    options:
      taint_intrafile: true
      taint_focus_on: source
    pattern-sources:
      # Direct dict access on environ
      - pattern: environ[$KEY]
      # .get() with default
      - pattern: environ.get($KEY, ...)
      # .get() without default
      - pattern: environ.get($KEY)
      # Broad environ reference within a WSGI callable
      - patterns:
          - pattern-inside: |
              def $FUNC(environ, start_response):
                  ...
          - pattern: environ
    pattern-propagators:
      # Attribute assignment
      - pattern: $SELF.$FIELD = $VALUE
        from: $VALUE
        to: $SELF
        by-side-effect: true
      # Attribute access
      - pattern: $OBJ.$FIELD
        from: $OBJ
        to: $RETURN
      # Function call propagation
      - pattern: $FUNC(..., $ARG, ...)
        from: $ARG
        to: $RETURN
      # Method call propagation
      - pattern: $OBJ.$METHOD(..., $ARG, ...)
        from: $ARG
        to: $RETURN
      # Constructor propagation
      - pattern: $CLASS(..., $ARG, ...)
        from: $ARG
        to: $RETURN
    pattern-sinks:
      - patterns:
          - pattern: start_response($STATUS, $HEADERS)
          - focus-metavariable: $HEADERS
    metadata:
      finding_type: source
      cve:
        - "CVE-2018-1000164"
      cwe:
        - "CWE-113: Improper Neutralization of CRLF Sequences in HTTP Headers"
      control_inversion: wsgi
      version: "1.0.0"
      description: >
        Forward pass bridging WSGI control inversion. Traces tainted data
        from the WSGI environ dict (HTTP request data provided by gunicorn)
        to the start_response callback (framework boundary). start_response
        reaches gunicorn's Response.process_headers() which is vulnerable
        to CRLF injection in gunicorn <=19.4.5.
      likelihood: HIGH
      impact: HIGH
      confidence: MEDIUM
