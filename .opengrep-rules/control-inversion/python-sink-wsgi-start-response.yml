rules:
  # Backward pass: WSGI callable boundary --> start_response sink
  # Bridges the control inversion gap for CVE-2018-1000164
  # (gunicorn process_headers CRLF injection)
  - id: python-wsgi-boundary-to-start-response
    message: "WSGI control inversion: data flows from callable boundary to start_response headers"
    severity: ERROR
    languages: [python]
    mode: taint
    options:
      taint_intrafile: true
      symbolic_propagation: true
      taint_focus_on: source
    pattern-sources:
      # Class constructor parameter boundary
      - pattern: |
          class $CLASS:
            def __init__(..., $INPUT,...):
              ...
      # Class method parameter boundary
      - pattern: |
          class $CLASS:
            def $METHOD(..., $INPUT, ...):
              ...
      # Standalone function parameter boundary
      - pattern: |
          def $FUNC($INPUT, ...):
            ...
    pattern-propagators:
      # Attribute assignment (by side-effect)
      - pattern: $SELF.$FIELD = $VALUE
        from: $VALUE
        to: $SELF
        by-side-effect: true
      # Attribute access
      - pattern: $OBJ.$FIELD
        from: $OBJ
        to: $RETURN
      # Constructor propagation
      - pattern: $CLASS($INPUT)
        from: $INPUT
        to: $RETURN
      # Function call propagation
      - pattern: $FUNC(..., $ARG, ...)
        from: $ARG
        to: $RETURN
      # Method call propagation
      - pattern: $OBJ.$METHOD(..., $ARG, ...)
        from: $ARG
        to: $RETURN
      # Nested attribute method call
      - pattern: $OBJ.$ATTR.$METHOD(..., $ARG, ...)
        from: $ARG
        to: $RETURN
    pattern-sinks:
      - patterns:
          - pattern: start_response($STATUS, $HEADERS)
          - focus-metavariable: $HEADERS
    metadata:
      finding_type: sink
      cve:
        - "CVE-2018-1000164"
      cwe:
        - "CWE-113: Improper Neutralization of CRLF Sequences in HTTP Headers"
      control_inversion: wsgi
      version: "1.0.0"
      description: >
        Backward pass bridging WSGI control inversion. Traces data from the
        WSGI callable boundary (function/method parameters where gunicorn
        injects environ and start_response) to the start_response callback.
        start_response reaches gunicorn's Response.process_headers() which
        is vulnerable to CRLF injection in gunicorn <=19.4.5.
      likelihood: HIGH
      impact: HIGH
      confidence: HIGH
