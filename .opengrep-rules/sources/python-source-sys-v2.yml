rules:  
  # Rule 1: Source-focused (for tracing forward from sources)  
  - id: python-sys-inputs-all-flows  
    message: "Taint source sys.argv[$INDEX] flows to sink"  
    severity: WARNING  
    languages: [python]  
    mode: taint  
    options:  
      taint_intrafile: true  
      taint_focus_on: source  
    pattern-sources:  
      - pattern: sys.argv[$INDEX]  
      - pattern: sys.orig_argv[$INDEX]  
      - pattern: sys.stdin  
      - pattern: sys.stdin.read(...)  
      - pattern: sys.stdin.readline(...)  
      - pattern: sys._xoptions  
      - pattern: sys.flags  
      
    pattern-propagators:  
      - pattern: $SELF.$FIELD = $VALUE  
        from: $VALUE  
        to: $SELF.$FIELD  
      - pattern: $OBJ.$FIELD  
        from: $OBJ  
        to: $OBJ.$FIELD  
    pattern-sinks:  
      - patterns:  
          - pattern: $CLASS($INPUT)  
          - focus-metavariable: $INPUT  
      - patterns:  
          - pattern: $OBJ.$METHOD($INPUT)  
          - focus-metavariable: $INPUT  
    metadata:  
      finding_type: source